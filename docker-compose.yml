
services:

  postgres:
    image: postgres:16
    container_name: bicos-db
    restart: always

    environment:
      POSTGRES_DB: bicos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: bico

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
