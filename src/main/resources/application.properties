spring.application.name=bicos

# Database Configuration
# Use environment variables in production: ${DB_URL}, ${DB_USER}, ${DB_PASSWORD}
spring.datasource.url=jdbc:postgresql://localhost:5432/bicos
spring.datasource.username=postgres
spring.datasource.password=bico

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update

# JWT Security
# WARNING: Use environment variable in production: ${JWT_SECRET}
api.security.token.secret=${JWT_SECRET:dev-only-secret-change-in-production}
